name: Update Predictions

# Fetches newly completed race results, retrains the model, regenerates race
# artifacts, and publishes a locked prediction for the next race. Commits any
# changed data/site/** (and the incremental race cache) straight to main —
# the site (Vercel) redeploys automatically on push.
#
# Schedule (see README.md in this directory for details / manual trigger
# instructions): every 6h across the Fri-Mon race window, plus a Wednesday
# safety-net run.

on:
  workflow_dispatch: {}
  schedule:
    # Friday (day 5), Saturday (6), Sunday (0): every 6h, all day, UTC.
    - cron: "0 0,6,12,18 * * 5"
    - cron: "0 0,6,12,18 * * 6"
    - cron: "0 0,6,12,18 * * 0"
    # Monday (1): only through midday UTC, since races/results are long settled by then.
    - cron: "0 0,6,12 * * 1"
    # Wednesday (3) midday: mid-week safety net in case a run was missed
    # (delayed results, late quali reschedule, transient FastF1/network failure, etc).
    - cron: "0 12 * * 3"

permissions:
  contents: write

concurrency:
  group: update-predictions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore FastF1 HTTP cache
        uses: actions/cache@v4
        with:
          path: cache_folder
          # Unique key per run so the cache is re-saved (and grows) every time;
          # restore-keys falls back to the most recent prefix match so we still
          # get a warm cache even though the exact key never hits.
          key: fastf1-cache-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-

      - name: Update after race (fetch results, retrain, regenerate artifacts)
        run: python scripts/update_after_race.py

      - name: Predict next race
        run: python scripts/predict_next.py

      - name: Commit and push updated artifacts
        run: |
          git config user.name "f1-predictor-bot"
          git config user.email "f1-predictor-bot@users.noreply.github.com"

          git add data/site/
          if [ -f f1_datasets/season_recent.json ]; then
            git add f1_datasets/season_recent.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to publish - nothing to commit."
            exit 0
          fi

          git commit -m "chore: update predictions [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
